name: Deploy AI School to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Find site directory
        id: site
        shell: bash
        run: |
          SITE_DIR="."

          if [[ ! -f "$SITE_DIR/index.html" || ! -d "$SITE_DIR/assets" || ! -d "$SITE_DIR/data" ]]; then
            SITE_DIR=""

            while IFS= read -r file; do
              dir="$(dirname "$file")"
              if [[ -f "$dir/index.html" && -d "$dir/assets" && -d "$dir/data" ]]; then
                SITE_DIR="$dir"
                break
              fi
            done < <(find . -type f -name "index.html" -not -path "./node_modules/*" | sort)
          fi

          if [[ -z "$SITE_DIR" ]]; then
            echo "::error::Не найдена папка сайта. Нужны index.html + assets + data"
            exit 1
          fi

          echo "site_dir=$SITE_DIR" >> "$GITHUB_OUTPUT"
          echo "Найдена папка сайта: $SITE_DIR"

      - name: Prepare artifact
        shell: bash
        run: |
          rm -rf dist
          mkdir -p dist
          rsync -av --delete "${{ steps.site.outputs.site_dir }}/" dist/
          touch dist/.nojekyll

          echo "Содержимое dist:"
          find dist -maxdepth 3 -type f | sort

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
